<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Basketball Scorecard</title>
  </head>
  <body>
    <main class="board">
      <div class="board-section">
        <div class="board-title">HOME</div>
        <div class="board-score">
          <div class="home-points">0</div>
        </div>
        <div class="home-btns">
          <button class="home-add-one-btn">+ 1</button>
          <button class="home-add-two-btn">+ 2</button>
          <button class="home-add-three-btn">+ 3</button>
        </div>
      </div>
      <div class="board-section">
        <div class="board-title">GUEST</div>
        <div class="board-score">
          <div class="guest-points">0</div>
        </div>
        <div class="guest-btns">
          <button class="guest-add-one-btn">+ 1</button>
          <button class="guest-add-two-btn">+ 2</button>
          <button class="guest-add-three-btn">+ 3</button>
        </div>
      </div>
    </main>
  </body>
</html>
