<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Basketball Scorecard</title>
    <link rel="stylesheet" href="./style.css" />
    <script type="module" src="./script.js"></script>
  </head>
  <body>
    <main class="board">
      <div class="board-section">
        <div class="board-title">HOME</div>
        <div class="board-score">
          <div class="board-points" id="home-points-el">0</div>
        </div>
        <div class="btns">
          <button class="btn" id="home-add-one-btn">+1</button>
          <button class="btn" id="home-add-two-btn">+2</button>
          <button class="btn" id="home-add-three-btn">+3</button>
        </div>
      </div>
      <div class="board-section">
        <div class="board-title">GUEST</div>
        <div class="board-score">
          <div class="board-points" id="guest-score-el">0</div>
        </div>
        <div class="btns">
          <button class="btn" id="guest-add-one-btn">+1</button>
          <button class="btn" id="guest-add-two-btn">+2</button>
          <button class="btn" id="guest-add-three-btn">+3</button>
        </div>
      </div>
    </main>
  </body>
  <button class="reset-btn" id="reset-btn">↻ New Game</button>
</html>
