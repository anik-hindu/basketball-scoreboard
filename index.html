<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Basketball Scorecard</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="board">
      <div class="board-section">
        <div class="board-title">HOME</div>
        <div class="board-score">
          <div class="board-points">0</div>
        </div>
        <div class="btns">
          <button class="home-add-one-btn btn">+1</button>
          <button class="home-add-two-btn btn">+2</button>
          <button class="home-add-three-btn btn">+3</button>
        </div>
      </div>
      <div class="board-section">
        <div class="board-title">GUEST</div>
        <div class="board-score">
          <div class="board-points">0</div>
        </div>
        <div class="btns">
          <button class="guest-add-one-btn btn">+1</button>
          <button class="guest-add-two-btn btn">+2</button>
          <button class="guest-add-three-btn btn">+3</button>
        </div>
      </div>
    </main>
  </body>
</html>
